<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Silvia & Alfonso — 1 Agosto 2026</title>

  <style>
    :root{
      --bg:#0b0c10;
      --text:#ffffff;
      --muted:rgba(255,255,255,.78);
      --glass: rgba(10,12,16,.40);
      --border: rgba(255,255,255,.18);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui;
      color:var(--text);
      background:var(--bg);
    }

    /* NAV */
    .nav{
      position:fixed;top:0;left:0;right:0;z-index:50;
      display:flex;justify-content:center;
      padding:14px;
      background:linear-gradient(to bottom, rgba(0,0,0,.55), transparent);
    }

    .nav-inner{
      width:min(1100px,100%);
      display:flex;justify-content:space-between;gap:12px;
    }

    .brand{
      font-weight:800;
    }

    .menu{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:flex-end;
    }

    .menu a{
      font-size:13px;
      padding:10px 12px;
      border-radius:999px;
      text-decoration:none;
    }

    /* HERO */
    .hero{
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:110px 16px 36px;
      position:relative;
      text-align:center;
    }

    @media (max-width:700px){
      .hero{ padding-top:175px; }
    }

    .hero::before{
      content:"";
      position:absolute;inset:0;
      background:url("assets/hero.jpeg") center/cover;
    }

    /* COUNTDOWN */
    .countdown-bar{
      position:relative;
      z-index:2;
      font-size:20px;
      padding:10px 18px;
      margin-bottom:40px;
      border-radius:999px;
      background:rgba(0,0,0,.4);
      transform:translateY(-35px);
    }

    /* CARD */
    .card{
      position:relative;
      z-index:2;
      padding:26px;
      border-radius:18px;
      background:rgba(0,0,0,.4);
    }

    @media (max-width:560px){
      .brand{
        margin-top:28px;
      }

      .card{
        transform:translateY(-150px);
      }
    }

    /* ✅ FIX TELEFONI PICCOLI */
    @media (max-width:430px){

      .nav-inner{
        gap:10px;
      }

      .brand{
        font-size:15px;
        min-width:96px;
        margin-top:16px;
      }

      .menu a{
        font-size:14px;
        padding:8px 10px;
      }

      .hero{
        padding-top:205px;
      }

      .countdown-bar{
        font-size:15px;
        padding:9px 14px;
        transform: translateY(-10px);
        margin-bottom:10px;
      }

      .card{
        transform: translateY(-105px);
      }

      h1{
        font-size:32px;
      }
    }

  </style>
</head>

<body>

<header class="nav">
  <div class="nav-inner">
    <div class="brand">Silvia &<br> Alfonso</div>

    <nav class="menu">
      <a href="#">Home</a>
      <a href="#">Evento</a>
      <a href="#">Programma</a>
      <a href="#">Album</a>
      <a href="#">RSVP</a>
      <a href="#">FAQ</a>
      <a href="#">Regali</a>
      <a href="#">Contatti</a>
    </nav>
  </div>
</header>

<main class="hero">

  <div class="countdown-bar" id="countdownBar">
    Mancano <span id="d">--</span>g •
    <span id="h">--</span>h •
    <span id="m">--</span>m •
    <span id="s">--</span>s
  </div>

  <section class="card">
    <h1>Silvia e Alfonso</h1>
    <p>Siamo felici di festeggiare con voi il nostro matrimonio!</p>
  </section>

</main>

<script>
const weddingDate = new Date('2026-08-01T16:00:00+02:00').getTime();

function updateCountdown(){
  const now = new Date().getTime();
  const diff = weddingDate - now;

  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff / (1000*60*60)) % 24);
  const m = Math.floor((diff / (1000*60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("d").textContent = d;
  document.getElementById("h").textContent = h;
  document.getElementById("m").textContent = m;
  document.getElementById("s").textContent = s;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
